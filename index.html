<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XP Architect</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Boot watchdog: if the app hasn't mounted after 8s, show a plain-text
      // diagnostic instead of a silent blank page (covers bundle 404s and
      // module-eval crashes, which happen before React error boundaries exist).
      setTimeout(function () {
        var root = document.getElementById("root");
        if (root && root.children.length === 0) {
          var d = document.createElement("div");
          d.style.cssText =
            "padding:32px 24px;font-family:system-ui,sans-serif;color:#999;text-align:center;";
          d.innerHTML =
            "<p style='font-size:16px;margin-bottom:8px'>XP Architect couldn't start.</p>" +
            "<p style='font-size:13px'>The app bundle didn't finish loading. Please reload — " +
            "if this persists, report code <strong>BOOT-WATCHDOG</strong>.</p>";
          root.appendChild(d);
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
